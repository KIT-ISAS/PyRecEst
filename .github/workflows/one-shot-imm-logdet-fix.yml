name: One-shot IMM logdet fix

permissions:
  contents: write

on:
  push:
    branches:
      - agent/fix-imm-logdet-underflow

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/fix-imm-logdet-underflow

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Apply IMM likelihood fix and regression test
        run: |
          python - <<'PY'
          from pathlib import Path

          implementation = Path("src/pyrecest/filters/interacting_multiple_model_filter.py")
          text = implementation.read_text(encoding="utf-8")
          old_import = """    asarray,\n    diag,\n    empty,\n"""
          new_import = """    asarray,\n    diag,\n    diagonal,\n    empty,\n"""
          if text.count(old_import) != 1:
              raise RuntimeError("Unexpected IMM backend import block")
          text = text.replace(old_import, new_import, 1)

          old_likelihood = """        det_value = float(linalg.det(innovation_covariance))\n        if det_value <= 0.0:\n            raise ValueError(\n                \"Innovation covariance must be positive definite to evaluate the IMM likelihood.\"\n            )\n        logdet = float(log(array(det_value)))\n"""
          new_likelihood = """        try:\n            cholesky_factor = linalg.cholesky(innovation_covariance)\n        except (np.linalg.LinAlgError, RuntimeError, ValueError) as exc:\n            raise ValueError(\n                \"Innovation covariance must be positive definite to evaluate the IMM likelihood.\"\n            ) from exc\n        logdet = 2.0 * float(log(diagonal(cholesky_factor)).sum())\n"""
          if text.count(old_likelihood) != 1:
              raise RuntimeError("Unexpected IMM determinant likelihood implementation")
          implementation.write_text(
              text.replace(old_likelihood, new_likelihood, 1), encoding="utf-8"
          )

          tests = Path("tests/filters/test_interacting_multiple_model_filter.py")
          test_text = tests.read_text(encoding="utf-8")
          if "import math\n" not in test_text:
              test_text = test_text.replace("import copy\n", "import copy\nimport math\n", 1)

          marker = """    def test_rejects_nonfinite_transition_matrix_and_mode_probabilities(self):\n"""
          regression = """    def test_linear_likelihood_handles_positive_definite_determinant_underflow(self):\n        predicted_state = GaussianDistribution(\n            array([0.0, 0.0]),\n            array([[0.0, 0.0], [0.0, 0.0]]),\n            check_validity=False,\n        )\n        measurement_noise = array([[1e-200, 0.0], [0.0, 1e-200]])\n\n        log_likelihood = (\n            InteractingMultipleModelFilter._log_linear_measurement_likelihood(\n                array([0.0, 0.0]),\n                predicted_state,\n                eye(2),\n                measurement_noise,\n            )\n        )\n\n        expected = -math.log(2.0 * math.pi) + 200.0 * math.log(10.0)\n        self.assertTrue(math.isfinite(log_likelihood))\n        self.assertAlmostEqual(log_likelihood, expected, places=12)\n\n"""
          if regression not in test_text:
              if test_text.count(marker) != 1:
                  raise RuntimeError("Unexpected IMM test insertion point")
              test_text = test_text.replace(marker, regression + marker, 1)
          tests.write_text(test_text, encoding="utf-8")
          PY

      - name: Install package and run focused tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
          PYRECEST_BACKEND=numpy python -m pytest -q tests/filters/test_interacting_multiple_model_filter.py

      - name: Commit verified fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pyrecest/filters/interacting_multiple_model_filter.py tests/filters/test_interacting_multiple_model_filter.py
          git rm .github/workflows/one-shot-imm-logdet-fix.yml
          git commit -m "Stabilize IMM Gaussian log likelihood"
          git push origin HEAD:agent/fix-imm-logdet-underflow
