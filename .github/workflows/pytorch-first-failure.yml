name: Temporary PyTorch first-failure diagnosis

on:
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  diagnose-pytorch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install system build dependencies
        run: |
          sudo rm -f \
            /etc/apt/sources.list.d/azure-cli.list \
            /etc/apt/sources.list.d/azure-cli.sources \
            /etc/apt/sources.list.d/microsoft-prod.list \
            /etc/apt/sources.list.d/microsoft-prod.sources
          sudo apt-get update
          sudo apt-get install -y \
            gfortran pkg-config ninja-build \
            libopenblas-dev liblapack-dev \
            libfftw3-dev libhealpix-cxx-dev

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip poetry
          poetry env use python
          poetry install --with dev --extras "healpy_support pytorch_support"

      - name: Capture first PyTorch failure
        run: |
          export PYRECEST_BACKEND=pytorch
          set +e
          poetry run python -m pytest \
            --rootdir . \
            -q \
            --maxfail=1 \
            --tb=long > pytorch-full.log 2>&1
          status=$?
          tail -n 500 pytorch-full.log > pytorch-first-failure.log
          printf '%s\n' "$status" > pytorch-exit-code.txt
          exit 0

      - name: Upload diagnosis
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytorch-first-failure
          path: |
            pytorch-first-failure.log
            pytorch-exit-code.txt
