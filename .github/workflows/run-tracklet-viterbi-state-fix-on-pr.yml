name: Run tracklet Viterbi state fix on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  run-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      GITHUB_REF_NAME: ${{ github.head_ref }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Execute and publish one-shot fix
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import subprocess
          from pathlib import Path

          workflow = Path(
              ".github/workflows/apply-tracklet-viterbi-state-fix.yml"
          ).read_text()

          def extract_step(name: str) -> str:
              marker = f"      - name: {name}\n"
              step_start = workflow.index(marker)
              run_marker = "        run: |\n"
              script_start = workflow.index(run_marker, step_start) + len(run_marker)
              script_lines = []
              for line in workflow[script_start:].splitlines(keepends=True):
                  if line.startswith("          "):
                      script_lines.append(line[10:])
                  elif not line.strip():
                      script_lines.append(line)
                  else:
                      break
              return "".join(script_lines)

          environment = os.environ.copy()
          for step_name in (
              "Apply source and regression patches",
              "Run focused regression",
          ):
              script = extract_step(step_name).replace(
                  "sed -i 's/^          //' /tmp/tracklet.patch\n",
                  "",
              )
              subprocess.run(
                  ["bash", "-lc", script],
                  check=True,
                  env=environment,
              )

          repository = environment["GITHUB_REPOSITORY"]
          branch = environment["GITHUB_REF_NAME"]

          def publish(path: str, message: str) -> None:
              endpoint = f"repos/{repository}/contents/{path}"
              current_sha = subprocess.check_output(
                  [
                      "gh",
                      "api",
                      "--method",
                      "GET",
                      endpoint,
                      "-f",
                      f"ref={branch}",
                      "--jq",
                      ".sha",
                  ],
                  text=True,
                  env=environment,
              ).strip()
              payload = {
                  "message": message,
                  "content": base64.b64encode(Path(path).read_bytes()).decode(),
                  "sha": current_sha,
                  "branch": branch,
              }
              subprocess.run(
                  ["gh", "api", "--method", "PUT", endpoint, "--input", "-"],
                  input=json.dumps(payload),
                  text=True,
                  check=True,
                  env=environment,
              )

          publish(
              "src/pyrecest/filters/tracklet_viterbi.py",
              "Fix tracklet Viterbi miss-streak state",
          )
          publish(
              "tests/filters/test_tracklet_viterbi.py",
              "Add tracklet Viterbi miss-streak regression",
          )
          PY
