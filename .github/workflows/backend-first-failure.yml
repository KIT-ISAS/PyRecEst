name: Backend reduction diagnosis

on:
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  reduction-values:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [pytorch, jax]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install system build dependencies
        run: |
          sudo rm -f \
            /etc/apt/sources.list.d/azure-cli.list \
            /etc/apt/sources.list.d/azure-cli.sources \
            /etc/apt/sources.list.d/microsoft-prod.list \
            /etc/apt/sources.list.d/microsoft-prod.sources
          sudo apt-get update
          sudo apt-get install -y \
            gfortran pkg-config ninja-build \
            libopenblas-dev liblapack-dev \
            libfftw3-dev libhealpix-cxx-dev

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip poetry
          poetry env use python
          if [ "${{ matrix.backend }}" = "jax" ]; then
            poetry install --with dev --extras "healpy_support jax_support"
          else
            poetry install --with dev --extras "healpy_support"
            poetry run python -m pip install \
              --index-url https://download.pytorch.org/whl/cpu \
              --extra-index-url https://pypi.org/simple \
              "torch>=2.4,<3.0"
          fi

      - name: Capture reduction intermediates
        run: |
          if [ "${{ matrix.backend }}" = "jax" ]; then
            export JAX_ENABLE_X64=True
          fi
          export PYRECEST_BACKEND=${{ matrix.backend }}
          poetry run python - <<'PY' 2>&1 | tee backend-values-${{ matrix.backend }}.log
          import numpy as np
          import pyrecest.backend as backend
          from pyrecest.distributions.abstract_dirac_distribution import AbstractDiracDistribution

          dtype = backend.to_numpy(backend.array([0.0], dtype=float)).dtype
          maximum = np.finfo(dtype).max
          weights = backend.array([maximum, maximum / 2.0], dtype=float)
          scale = backend.max(weights)
          scaled = weights / scale
          total = backend.sum(scaled)
          finite = backend.isfinite(total)
          positive = total > 0

          print("backend", backend.__backend_name__)
          print("dtype", dtype)
          print("max function", backend.max, getattr(backend.max, "__module__", None))
          print("sum function", backend.sum, getattr(backend.sum, "__module__", None))
          print("isfinite function", backend.isfinite, getattr(backend.isfinite, "__module__", None))
          print("weights", repr(weights), type(weights))
          print("scale", repr(scale), type(scale), backend.to_numpy(scale))
          print("scaled", repr(scaled), type(scaled), backend.to_numpy(scaled))
          print("total", repr(total), type(total), backend.to_numpy(total))
          print("finite", repr(finite), bool(finite))
          print("positive", repr(positive), bool(positive))
          try:
              result = AbstractDiracDistribution._validate_weights(weights)
          except Exception as exc:
              print("validate exception", type(exc).__name__, str(exc))
          else:
              print("validate result", result)
          PY

      - name: Upload diagnosis
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-values-${{ matrix.backend }}
          path: backend-values-${{ matrix.backend }}.log
