name: Apply TopK duplicate-hypothesis fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-top-k-duplicate-hypothesis-fix
  cancel-in-progress: true

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bugfix/top-k-duplicate-hypotheses-20260710
          fetch-depth: 1
          show-progress: false
      - name: Apply fix
        run: python .github/apply_top_k_fix.py
      - name: Validate targeted test
        run: |
          python -m compileall -q \
            src/pyrecest/filters/association_hypotheses.py \
            tests/filters/test_association_hypotheses.py
          python -m pytest -q \
            tests/filters/test_association_hypotheses.py \
            -k "top_k_gate"
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix TopKGate duplicate hypothesis selection"
          git push origin HEAD:bugfix/top-k-duplicate-hypotheses-20260710
